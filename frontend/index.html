<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="shortcut icon" href="/assets/img/favicon.svg" type="image/svg">
  <title></title>
</head>
<body>
  <div id="app"></div>
  <script src="/elm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    function loadUserData() {
      const raw = localStorage.getItem("xastge_userdata");
      if (!raw) {
        return null;
      }

      try {
        const parsed = JSON.parse(raw);
        if (
          parsed &&
          typeof parsed.username === "string" &&
          typeof parsed.email === "string" &&
          typeof parsed.token === "string"
        ) {
          return {
            username: parsed.username,
            email: parsed.email,
            token: parsed.token,
            confirmed: typeof parsed.confirmed === "boolean" ? parsed.confirmed : false,
            role: typeof parsed.role === "string" ? parsed.role : "user"
          };
        }
      } catch (_err) {
      }

      localStorage.removeItem("xastge_userdata");
      return null;
    }

    const app = Elm.Main.init({
      node: document.getElementById("app"),
      flags: {
        userData: loadUserData(),
        backend: localStorage.getItem("xastge_backend") || null
      }
    });

    app.ports.saveBackend.subscribe(function(backend) {
      if (backend) {
        localStorage.setItem("xastge_backend", backend);
      }
    });

    app.ports.saveUserData.subscribe(function(userData) {
      if (userData) {
        localStorage.setItem("xastge_userdata", JSON.stringify(userData));
      }
    });

    app.ports.cleanUserData.subscribe(function() {
      localStorage.removeItem("xastge_userdata");
    });
  </script>
</body>
</html>
